<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme DFS Maze - Williams Purple & Gold</title>
    <style>
        :root {
            --williams-purple: #3C1053; /* Official Williams Purple */
            --williams-gold: #FFC72C;   /* Official Williams Gold */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: #121212; /* Dark background for contrast */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            background: repeating-linear-gradient(
                45deg,
                var(--williams-purple),
                var(--williams-purple) 20px,
                var(--williams-gold) 20px,
                var(--williams-gold) 40px
            );
            color: white;
            padding: 20px;
            margin: 0;
            width: 100%;
            border-bottom: 5px solid var(--williams-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .controls {
            margin: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 2px solid #444;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 0 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .gen-btn {
            background-color: var(--williams-purple);
            color: white;
            border: 2px solid var(--williams-gold);
        }

        .solve-btn {
            background-color: var(--williams-gold);
            color: var(--williams-purple);
            border: 2px solid var(--williams-purple);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }

        button:active {
            transform: translateY(-1px);
        }

        #canvas-container {
            margin-bottom: 30px;
            padding: 10px;
            background: #222;
            border: 5px solid var(--williams-purple);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        canvas {
            display: block;
            background: white; /* Clean white for maze path */
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Extreme Challenge Maze</h1>
    
    <div class="controls">
        <button class="gen-btn" onclick="initMaze()">Generate Hard Maze</button>
        <button class="solve-btn" onclick="startSolving()">Watch DFS Solve</button>
    </div>

    <div id="canvas-container">
        <canvas id="mazeCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
