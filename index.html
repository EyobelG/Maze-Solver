<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DFS Maze - Eyobel's Version</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: white; }
        canvas { background: #fff; border: 4px solid #444; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .controls { margin: 20px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; margin: 0 10px; transition: 0.3s; }
        .gen-btn { background: #3498db; color: white; }
        .solve-btn { background: #2ecc71; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <h1>Maze Solver 🧩</h1>
    <div class="controls">
        <button class="gen-btn" onclick="initMaze()">New Maze</button>
        <button class="solve-btn" onclick="startSolving()">Solve with DFS</button>
    </div>
    <canvas id="mazeCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
